semantic_id: sem-concept-eqc-persistence-layering
semantic_node_type: semantic_concept
title: EQC persistence layering
summary: EQC persistence is layered around a provider-retention root in base_info,
  with business_info and biz_label acting as downstream normalized and parsed persistence
  surfaces keyed to that root.
business_conclusion: base_info should be interpreted as the retained provider-result
  surface for EQC acquisition, while business_info and biz_label should be interpreted
  as downstream business-canonicalized persistence derived from retained raw payloads
  rather than as independent provider-truth stores or runtime-only scratch tables.
