semantic_node_type: semantic_lifecycle
title: Customer MDM manual runtime boundary
summary: customer-mdm remains an explicit manual operator surface whose five subcommands
  map to separate runtime controls instead of collapsing into a single hidden hook
  path.
business_conclusion: customer-mdm commands are a manual operator/runtime boundary
  outside hook-only execution. sync, snapshot, init-year, validate, and cutover are
  distinct operator controls, not aliases for one hidden hook chain. The unified CLI
  exposes them separately, and the delegated runtime functions split contract sync,
  monthly snapshot refresh, annual initialization, validation/reporting, and annual
  cutover into different operator-facing actions.
