title: Reference sync pre-load cycle
summary: reference_sync is a dedicated pre-load cycle with its own job, schedule,
  and stateful runtime controls rather than an inline side effect of domain ETL.
business_conclusion: reference_sync should be interpreted as an independent pre-load
  lifecycle. It is scheduled before fact-oriented processing, owns its own job/op
  boundary, and carries explicit state controls such as persisted state, explicit
  state injection, and force_full_sync.
