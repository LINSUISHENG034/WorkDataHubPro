semantic_node_type: semantic_lifecycle
title: Company lookup queue recovery cycle
summary: company_lookup_queue is a bounded asynchronous recovery loop with explicit
  retry, trigger, and stale-processing recovery semantics.
business_conclusion: 'company_lookup_queue is not just an enqueue side effect. It
  owns a recovery cycle: hourly scheduled processing, optional threshold-based sensor
  triggering, dequeue only when next_retry_at has elapsed, bounded retry backoff of
  1/5/15 minutes, permanent failure after three attempts, and stale processing rows
  reset back to pending.'
