  contradiction_accounting_notes:
  - Legacy capability-map wording sometimes says customer-plan history or historical/current
    rows because the lookup table is historically versioned, but the guard tests constrain
    event-domain enrichment to current contract rows via valid_to = '9999-12-31'.
  - effective_period ordering and plan-type prefix preference refine candidate choice
    inside the current-row lookup stage; they do not widen the behavior into arbitrary
    historical contract replay.
  - preserve-source behavior, current-row lookup, and domain-default fallback are
    distinct enrichment stages with different rule identities and should not be collapsed
    into one generic enrichment step.
