semantic_id: sem-rule-event-domain-current-row-contract-lookup
semantic_node_type: semantic_rule
title: Event-domain current-row contract lookup
summary: annual_award and annual_loss enrich missing event-domain plan_code values
  through a three-stage boundary of source preservation, current-row contract lookup,
  and domain-default fallback rather than through generic historical contract replay.
business_conclusion: For annual_award and annual_loss, event-domain plan-code enrichment
  is a current-row temporal contract lookup boundary. The runtime first preserves
  any non-empty source plan_code, then uses the resolved company_id plus product_line_code
  to query current contract rows and choose the best candidate with effective-period
  and plan-type preference, and only then applies the domain default fallback. This
  is not a general replay across arbitrary historical customer-plan rows.
