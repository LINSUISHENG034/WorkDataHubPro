  contradiction_accounting_notes:
  - enrichment_index rows carry durable-looking metadata such as confidence, provenance,
    and hit counts, but the legacy docs and resolver ordering still classify the table
    as a cache layer inside the identity pipeline rather than as the enterprise identity
    object.
  - Runtime reuse and append-only behavior make the cache operationally important,
    yet lower layers such as queueing, EQC lookup, and temp-id fallback remain able
    to supersede cache misses or populate new cache evidence.
