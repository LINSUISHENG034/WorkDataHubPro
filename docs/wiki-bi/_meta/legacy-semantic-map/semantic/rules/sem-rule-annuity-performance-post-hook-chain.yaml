summary: customer_mdm sync and snapshot side effects are not generic post-load behavior;
  they are an annuity_performance-specific hook chain with ordered recovery semantics.
business_conclusion: 'the default runtime path for customer_mdm yearly identity updates
  is an annuity_performance-only post-ETL chain: contract_status_sync, then year_init
  for January periods, then snapshot_refresh. Manual customer-mdm commands exist as
  recovery or operator surfaces, not as the primary semantic trigger for normal downstream
  refresh.'
