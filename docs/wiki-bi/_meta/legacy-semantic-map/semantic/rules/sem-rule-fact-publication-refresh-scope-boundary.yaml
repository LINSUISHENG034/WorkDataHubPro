  contradiction_accounting_status: explained_scope_limited_alias
  contradiction_accounting_notes:
  - Legacy docs often label the configured columns as `pk`, `refresh key`, or refresh
    range, but loader code uses them specifically to choose which existing fact rows
    are deleted before replacement insert.
  - Fact schema definitions split `primary_key` and `composite_key` from `delete_scope_key`,
    which shows refresh scope is narrower than the total semantic identity or relation
    surface of the fact family.
  - Capability maps and current output-contract pages show the same fact families
    also drive backfill, contract-state, and monthly-snapshot consequences, so refresh
    scope cannot be promoted into the full semantic meaning of the published record
    family.
  - This rule is about fact sinks and `delete_insert` refresh scope only; it must
    not be collapsed into company lookup queue publication boundary or reference_sync
    incremental-state semantics.
