title: Company lookup queue single-domain boundary
summary: company_lookup_queue is an explicit special orchestration domain, not a normal
  member of multi-domain ETL execution.
business_conclusion: company_lookup_queue should be interpreted as a standalone orchestration
  surface. It is valid as a single-domain special run, but it is excluded from multi-domain
  and --all-domains ETL paths, which keeps queue recovery semantics separate from
  normal fact-domain batching.
