title: Strategic ratchet rule
summary: Strategic customer status can upgrade into place but should not be automatically
  downgraded by short-term decline.
business_conclusion: The strategic-customer rule is upgrade-only in normal status
  sync semantics; a customer may become strategic, but short-term decline does not
  automatically revoke strategic status.
