semantic_node_type: semantic_rule
title: Company lookup queue publication boundary
summary: company_lookup_queue persistence and adjacent enrichment-index writes publish
  identity-runtime state, but they are not first-wave fact publication or accepted
  explicit publication groups.
business_conclusion: company_lookup_queue and its persistence writes are identity-runtime
  publication carriers, not equivalents of first-wave fact publication or accepted
  publication groups. Writes to enterprise.enrichment_requests publish async identity-recovery
  state, while enrichment_index updates publish reusable identity-cache state; both
  must stay separate from business fact publication semantics.
