title: Company ID multi-signal resolution
summary: company_id resolution is a layered multi-signal process; missing customer_name
  does not imply unresolved enterprise identity.
business_conclusion: company_id resolution must remain a governed multi-signal chain
  across overrides, plan clues, customer-name clues, account cues, cache, provider
  lookup, and fallback handling; customer_name emptiness alone must not be treated
  as identity failure.
