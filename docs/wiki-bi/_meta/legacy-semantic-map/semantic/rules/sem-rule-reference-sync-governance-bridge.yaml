semantic_node_type: semantic_rule
title: Reference sync governance bridge
summary: reference_sync is the governance bridge between retained authoritative inventory
  and sync-contract memory and the current explicit reference_derivation -> publication
  replacement path.
business_conclusion: legacy reference_sync should be interpreted as a governance bridge
  rather than as a requirement to keep the same repo-native runtime alive. The retained
  truth is the authoritative target inventory and sync contract memory carried by
  reference_sync configuration and models, while the current accepted replacement
  path is explicit reference_derivation -> publication. Replacing the runtime carrier
  therefore must not erase the retained governance truth about what authoritative
  reference targets and contracts still need to be explained.
