semantic_id: sem-rule-customer-master-derived-signal-provenance
semantic_node_type: semantic_rule
title: Customer-master derived signal provenance
summary: Customer-master signals are grouped derived outputs from backfill aggregation
  families, not raw fact publication and not snapshot-status fields.
business_conclusion: "Customer-master signals are fact-derived backfill outputs with\
  \ distinct provenance families. Dominant-value signals such as \u4E3B\u62D3\u673A\
  \u6784, \u4E3B\u62D3\u673A\u6784\u4EE3\u7801, and \u5173\u952E\u5E74\u91D1\u8BA1\
  \u5212 come from weighted max_by selection, breadth-count signals such as \u5173\
  \u8054\u8BA1\u5212\u6570 and \u5173\u8054\u673A\u6784\u6570 come from count_distinct\
  \ aggregation, breadth-list signals such as \u5176\u4ED6\u5E74\u91D1\u8BA1\u5212\
  \ and \u5176\u4ED6\u5F00\u62D3\u673A\u6784 come from concat_distinct aggregation,\
  \ classification signals such as \u5E74\u91D1\u5BA2\u6237\u7C7B\u578B, \u7BA1\u7406\
  \u8D44\u683C, and \u5E74\u91D1\u8BA1\u5212\u7C7B\u578B come from classification-oriented\
  \ concat_distinct or template rules, and timeline-tag signals such as tags with\
  \ yyMM\u65B0\u5EFA, yyMM\u4E2D\u6807, and yyMM\u6D41\u5931 come from date-formatted\
  \ tag append rules. These signal families must not be collapsed into raw fact publication\
  \ or snapshot status semantics."
