semantic_node_type: semantic_rule
title: First-wave unresolved-name and failed-record artifacts are operator evidence
summary: Across first-wave annuity_performance and annuity_income runs, unresolved-name
  CSVs and unified failed-record CSVs preserve operator review visibility, but they
  do so as evidence artifacts rather than as business-semantic fact outputs.
business_conclusion: First-wave unresolved-name and failed-record artifacts should
  be interpreted as operator-only evidence carriers. They make unresolved identity
  and dropped-row conditions inspectable for manual review and reconciliation, but
  they do not themselves encode business truth objects, downstream fact schema, or
  stable business-semantic outputs.
