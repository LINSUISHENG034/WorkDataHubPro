ingress_kind: question_cluster
title: Current high-value durable absorption queue
granularity_rationale: 'The user asked for the current high-value business-semantic
  list that still needs durable absorption planning. The stable unit is a question
  cluster because several accepted semantic families share one governance decision:
  what should be absorbed now as durable business meaning, what should be preserved
  only as evidence-oriented memory, and what can remain deferred runtime-governance
  detail.'
questions:
- Which accepted semantic families should be first in the durable wiki absorption
  queue right now?
- Which items are stable business-semantic canon versus proposal-grade runtime-governance
  memory?
- Which non-equivalences must be absorbed together so legacy shortcut wording does
  not collapse distinct meanings?
- Which secondary runtime/operator surfaces can stay deferred without losing core
  business meaning?
candidate_conclusions:
- 'Tier 1 absorb-now cluster: customer-status governance core should be absorbed first,
  centered on customer status as a distinct business layer, customer-master backfill
  vs customer-status non-equivalence, the annual identity family, the strategic ratchet
  rule, and the status-rule decision anchor.'
- 'Tier 1 absorb-now cluster: company-identity governance should be absorbed immediately,
  centered on company_id as the cross-domain identity anchor, temp_id as a governed
  unresolved-identity fallback rather than equivalent identity truth, and multi-signal
  resolution across plan, name, cache, EQC, and fallback paths.'
- 'Tier 1 absorb-now cluster: classification-family layering should be absorbed immediately
  so input-side plan type, customer-master annuity-plan type, business type, management
  qualification, and portfolio anchors are not flattened into one interchangeable
  label family.'
- 'Tier 2 absorb-as-governed-memory cluster: reference strategy layering should be
  preserved explicitly as a two-layer strategy, where reference_sync preloads authoritative
  reference data and backfill derives missing references under FK-safe constraints
  rather than acting as the same semantic step.'
- 'Tier 2 absorb-as-governed-memory cluster: fact publication refresh-scope boundary
  should be absorbed on output-correctness and evidence surfaces as proposal-grade
  memory, because refresh keys and delete scopes govern rerun replacement boundaries
  but do not define the full business grain of the published fact families.'
- 'Secondary and generally deferrable surfaces: queue retry mechanics, incremental-state
  persistence, workbook discovery arbitration, and other operator-adjacent runtime
  carriers should only be absorbed when they are needed to explain one of the Tier
  1 or Tier 2 business boundaries.'
