open_points:
- status_year belongs in the first customer-status absorption cluster, but durable
  wording should preserve the current rebuild-side carrier gap rather than presenting
  it as fully closed runtime truth.
- Main-thread absorption sequencing still needs a page-level bundling decision so
  customer-status, identity-governance, and classification-family summaries are not
  duplicated across concept, evidence, and standards pages.
- Reference-sync target inventory and fact-publication refresh-scope boundary are
  high-value governance memory, but they should stay evidence-oriented unless the
  main thread explicitly wants a stronger canonical semantic treatment.
- Legacy company-identity materials preserve more than one historical priority-order
  narration; durable absorption should explain that drift rather than silently normalizing
  it away.
