ingress_kind: finding
title: Fact-publication refresh-boundary absorption bundle
granularity_rationale: This finding captures the high-value publication-boundary semantics
  around refresh scope. The legacy system clearly uses delete-scope and refresh-key
  contracts for rerun replacement, but those contracts do not define the full business
  grain of the fact families they publish.
questions:
- How should refresh-key and delete-scope semantics be absorbed without overstating
  them as the full business grain?
- What belongs to output-governance memory versus stable business meaning?
candidate_conclusions:
- Absorb refresh-key and delete-scope semantics as rerun replacement contracts for
  fact publication, not as the full business identity grain or snapshot grain of the
  published families.
- Absorb the consequence that the same fact families still feed backfill, contract-state,
  and snapshot interpretation beyond their refresh boundary.
- Keep this boundary on output-governance and evidence-oriented surfaces so refresh
  scope stays explicit without displacing the broader business semantics of the fact
  families.
