ingress_kind: finding
title: Classification-family absorption bundle
granularity_rationale: This finding captures the classification-family boundary that
  should be absorbed together. Input plan type, customer-master annuity-plan type,
  business type, management qualification, and portfolio anchors only remain intelligible
  when treated as one layered family instead of disconnected field notes.
questions:
- Which classification semantics must be absorbed together so input labels, customer-master
  aggregations, and portfolio anchors are not flattened into one interchangeable field
  set?
- Which distinctions should stay explicit in first-pass durable absorption?
candidate_conclusions:
- Absorb input-side plan type, customer-master annuity-plan type, business type, management
  qualification, and portfolio anchors as one layered classification family.
- Absorb the boundary that input-side plan type is not equivalent to aggregated customer-master
  annuity-plan type.
- Treat classification-family context as a prerequisite for later identity and output
  explanations rather than as one local data-cleaning detail.
