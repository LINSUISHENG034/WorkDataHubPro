title: Company-identity governance absorption bundle
granularity_rationale: This bundle captures the high-value company-identity semantics
  that must be absorbed together. Splitting company_id anchor meaning, multi-signal
  resolution, and temp-id fallback into isolated fragments would hide the actual business
  identity boundary preserved by the legacy system.
questions:
- Which identity semantics must be absorbed together so company_id, temp_id, and multi-signal
  resolution are not flattened into one local lookup story?
- Which details belong to the business identity boundary and which should remain operator-facing
  explanation surfaces?
candidate_conclusions:
- Absorb company_id as the stable cross-domain enterprise identity anchor rather than
  a byproduct of one resolver step or one local cache path.
- 'Absorb multi-signal resolution as part of the identity boundary: plan clues, customer-name
  clues, cache, provider lookup, and fallback handling all witness that identity is
  not reducible to one field.'
- Absorb temp_id as a governed unresolved-identity retention fallback, not as equivalent
  identity truth.
- Treat lookup-queue mechanics, EQC budgeting, and cache implementation details as
  secondary explanation surfaces unless they are needed to explain the identity boundary
  itself.
