title: Customer-status governance absorption bundle
granularity_rationale: This bundle is a single finding about what must be absorbed
  together from the legacy customer-status semantics. It is intentionally broader
  than one semantic node because the business boundary becomes misleading when customer
  status, annual identity fields, and status-source splitting are absorbed separately.
questions:
- Which customer-status meanings must be absorbed together so master-data completion,
  status evaluation, and snapshot analysis are not collapsed?
- Which annual identity fields belong to the same first-pass absorption bundle?
- Which adjacent proxy surfaces should stay outside the first absorption pass until
  separately adjudicated?
candidate_conclusions:
- Absorb customer status as a distinct business layer rather than a byproduct of customer-master
  completion or one mixed status table.
- 'Absorb the annual identity family together: is_strategic, is_existing, contract_status,
  and status_year belong to one yearly customer-identity interpretation bundle.'
- Absorb the strategic ratchet rule and source-family splitting as first-pass durable
  semantics because they materially constrain downstream interpretation.
- Keep the customer-master new-customer tag versus snapshot is_new proxy conflict
  outside the first absorption pass until the alias conflict is explicitly adjudicated.
