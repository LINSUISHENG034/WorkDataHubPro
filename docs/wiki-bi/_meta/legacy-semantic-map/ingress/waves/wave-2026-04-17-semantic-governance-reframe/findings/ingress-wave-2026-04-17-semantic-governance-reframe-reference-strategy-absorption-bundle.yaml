- Target-inventory and incremental-state details are high-value governance memory,
  but the main thread still needs to decide how much of that detail belongs on durable
  surfaces versus evidence pages.
- The first-pass absorption should preserve the two-layer strategy without accidentally
  promoting every operator detail into business-semantic canon.
