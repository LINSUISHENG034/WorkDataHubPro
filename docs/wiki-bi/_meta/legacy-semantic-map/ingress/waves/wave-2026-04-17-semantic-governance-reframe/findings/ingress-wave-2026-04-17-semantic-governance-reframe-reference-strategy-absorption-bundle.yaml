ingress_kind: finding
title: Reference-strategy absorption bundle
granularity_rationale: This finding captures the high-value reference-strategy semantics
  that should be absorbed together. The legacy materials preserve a two-layer strategy,
  and that meaning becomes distorted if reference_sync, backfill, and FK-safe sequencing
  are described as one undifferentiated completion step.
questions:
- What should be absorbed as the core reference-strategy meaning, and what should
  remain governed surface memory?
- Which distinctions must stay explicit so authoritative pre-load and derived backfill
  are not collapsed?
candidate_conclusions:
- Absorb reference_sync and backfill as two related but non-equivalent layers of one
  reference strategy.
- Absorb reference_sync as the authoritative pre-load layer that prepares governed
  reference data before fact loading.
- Absorb backfill as the derived FK-safe completion layer that materializes missing
  references and customer-master side effects from processed fact data.
- Keep target-inventory details, incremental-state mechanics, and preload-cycle narration
  as governed evidence memory unless the main thread explicitly needs a stronger canonical
  treatment.
