  semantic_node_type: semantic_rule
  title: Enrichment index cache boundary
  summary: enrichment_index is a governed runtime cache with confidence and provenance arbitration, not the durable enterprise identity truth object itself.
  business_conclusion: enrichment_index should be interpreted as a reusable runtime cache layer that accelerates and records company_id resolution evidence, while durable business identity semantics remain anchored in company_id and downstream business projections rather than in cache rows themselves.
