semantic_findings:
- semantic_id: sem-rule-workbook-discovery-version-arbitration
  semantic_node_type: semantic_rule
  title: Workbook discovery and version arbitration boundary
  summary: Directory scanning and highest-version arbitration are input-admission runtime carriers that decide which workbook instance a domain may read, while shared workbook family or folder ancestry does not merge distinct domain sheet contracts.
  business_conclusion: >-
    Directory scanning, version-folder selection, and file-pattern-aware
    highest-version arbitration should be interpreted as operator/runtime
    admission contracts rather than low-level plumbing. They govern which
    workbook instance enters a domain run, but they do not redefine the domain
    itself. Shared workbook family, shared folder ancestry, or shared version
    strategy can explain why multiple domains are admitted through adjacent
    physical carriers, yet those carriers do not collapse separate sheet-scoped
    domain contracts into one domain.
  primary_source_refs:
  - config/data_sources.yml
  - docs/domains/annuity_performance-capability-map.md
  - docs/domains/annuity_income-capability-map.md
  - docs/domains/annual_award-capability-map.md
  - docs/domains/annual_loss-capability-map.md
