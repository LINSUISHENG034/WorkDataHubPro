  semantic_node_type: semantic_non_equivalence
  title: reference_sync vs backfill
  summary: reference_sync and backfill may touch related business objects, but they do not express the same write surface or provenance.
  business_conclusion: object-name overlap does not make reference_sync and backfill semantically equivalent. reference_sync writes governed authoritative inventory with pre-load semantics, while backfill writes derived or side-effectful objects after processed facts have already established missing references.
