- semantic_id: sem-concept-reference-strategy-layering
  semantic_node_type: semantic_concept
  title: Reference strategy layering
  summary: Legacy reference handling splits authoritative pre-load reference_sync from process-time backfill instead of treating both as one generic completion step.
  business_conclusion: reference_sync and backfill belong to one reference strategy but they are layered, non-equivalent objects. reference_sync preloads authoritative reference data before fact processing, while backfill derives missing references and customer-master side effects from processed fact rows under FK-safe gating.
  primary_source_refs:
