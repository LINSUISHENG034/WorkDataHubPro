semantic_findings:
- semantic_id: sem-rule-customer-master-derived-signal-provenance
  semantic_node_type: semantic_rule
  title: Customer-master derived signal provenance
  summary: Customer-master signals are grouped derived outputs from backfill aggregation families, not raw fact publication and not snapshot-status fields.
  business_conclusion: Customer-master signals are fact-derived backfill outputs with distinct provenance families. Dominant-value signals such as 主拓机构, 主拓机构代码, and 关键年金计划 come from weighted max_by selection, breadth-count signals such as 关联计划数 and 关联机构数 come from count_distinct aggregation, breadth-list signals such as 其他年金计划 and 其他开拓机构 come from concat_distinct aggregation, classification signals such as 年金客户类型, 管理资格, and 年金计划类型 come from classification-oriented concat_distinct or template rules, and timeline-tag signals such as tags with yyMM新建, yyMM中标, and yyMM流失 come from date-formatted tag append rules. These signal families must not be collapsed into raw fact publication or snapshot status semantics.
  primary_source_refs:
  - config/foreign_keys.yml
  - docs/business-background/客户主数据回填与状态来源分析.md
  supporting_source_refs:
