semantic_findings:
- semantic_id: sem-rule-fact-publication-refresh-scope-boundary
  semantic_node_type: semantic_rule
  title: Fact publication refresh-scope boundary
  summary: Delete-scope or refresh-key columns in legacy `delete_insert` fact publication decide which previously published fact rows are replaced on rerun, but they do not define the full business identity grain or downstream semantic scope of the published fact family.
  business_conclusion: >-
    delete-scope and refresh-key semantics in the legacy fact sinks are
    fact-publication replacement contracts, not business identity grain or
    snapshot grain. The refresh keys decide the overwrite boundary for a rerun
    of a fact family, not the full semantic meaning of that family or all of
    its downstream contract and snapshot consequences.
  primary_source_refs:
